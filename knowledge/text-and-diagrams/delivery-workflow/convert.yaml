out: .output
formats:
  - pdf
  - docx
  - html
options:
  toc: true
  cover_page: false
  standalone: true
metadata:
  author: ""
pandoc_args: []
sources:
  include:
    - "**/*.md"
  exclude:
    - README.md
    - ".output/**"
    - index.md
    - log.md
  unlisted: ignore
documents:
  - name: delivery-workflow
    sources:
      - 01-purpose.md
      - 02-intake.md
      - 03-authoring.md
      - 04-review-publish.md
    metadata:
      title: Delivery workflow
assets:
  mode: generate
  directory: assets
  diagrams:
    mermaid: true
  copy_referenced_images: true
links:
  markdown: output
  missing_target: warn
  external: preserve
